<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在線アプリ</title>
    <style>
        :root {
            --bg-color: #F0F0F0;
            --sub-bg-color: #F8F8F8;
            --header-bg: #1C1C1C;
            --btn-color: #333333;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
        }

        .header { 
            background: var(--header-bg);
            color: white; 
            padding: 0 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 56px;
            font-size: 1.1rem; 
            position: sticky; 
            top: 0;
            z-index: 100; 
            margin: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }

        /* ハンバーガーメニューボタン */
        .menu-btn {
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 200;
        }
        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: white;
            transition: 0.3s;
        }

        /* メニューが開いているときのボタンアニメーション */
        .menu-btn.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .menu-btn.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-btn.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* スライドナビゲーションメニュー */
        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 250px;
            height: 100%;
            background: rgba(28, 28, 28, 0.95);
            z-index: 150;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
        }
        .nav-menu.active {
            right: 0;
        }
        .nav-menu-item {
            padding: 20px;
            color: white;
            border-bottom: 1px solid #444;
            cursor: pointer;
            font-size: 16px;
            display: block;
            text-decoration: none;
        }
        .nav-menu-item:active {
            background: #444;
        }

        /* オーバーレイ（背景の影） */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 140;
        }
        .menu-overlay.active {
            display: block;
        }

        .screen {
            padding: 20px;
        }

        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
        }

        .system-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            transition: opacity 0.2s;
        }

        .system-btn:hover {
            opacity: 0.9;
        }

        #zaisen-screen {
            display: none;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
        }

        .railway-line-container {
            position: absolute;
            right: 120px;
            top: 0;
            bottom: 0;
            width: 20px;
            pointer-events: none;
            z-index: 1;
        }

        .railway-line-segment {
            width: 100%;
            position: absolute;
        }

        .station-row {
            display: flex;
            align-items: center;
            height: 80px;
            position: relative;
            background-color: var(--sub-bg-color);
            margin-bottom: 2px;
            border-bottom: 1px solid #e0e0e0;
        }

        .station-name {
            width: 150px;
            padding-left: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 2;
        }

        .train-icon {
            position: absolute;
            width: 24px;
            height: 24px;
            background-image: url('unknown.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
            transition: all 0.5s linear;
        }

        .branch-trigger {
            position: absolute;
            right: 20px;
            background: #e0e0e0;
            border: 1px solid #999;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="back-button" class="back-btn" onclick="showHomeScreen()">← 戻る</button>
        <span id="header-title">ホーム</span>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div id="nav-menu" class="nav-menu">
        <div id="last-update" class="nav-menu-item" style="cursor: default; background: none; color: #ccc; font-size: 0.9rem;">
            最終更新：--:--:--
        </div>
        <div class="nav-menu-item" onclick="reloadData()">🔄 データを再読み込み</div>
    </div>
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div id="home-screen" class="screen"></div>

    <div id="zaisen-screen" class="screen">
        <div id="station-list"></div>
        <div id="line-layer" class="railway-line-container"></div>
        <div id="train-layer"></div>
    </div>

    <script>
        let systemNameMap = {};    
        let activeLayouts = {};    
        let stationsMap = {};      
        let railroadMap = {};      
        
        let currentSystem = '';     
        let currentStations = [];   
        let timetables = { in: [], out: [] }; 

        // 定期的な列車位置更新は5秒に1回継続
        setInterval(updateTrainPositions, 5000);

        window.onload = async () => {
            await initApp();
        };

        // メニューの開閉
        function toggleMenu() {
            document.querySelector('.menu-btn').classList.toggle('active');
            document.getElementById('nav-menu').classList.toggle('active');
            document.getElementById('menu-overlay').classList.toggle('active');
        }

        // 最終更新時刻の更新
        function setLastUpdateTime() {
            const now = new Date();
            document.getElementById('last-update').innerText = '最終更新：' + now.toLocaleTimeString('ja-JP');
        }

        // アプリ全体の初期化
        async function initApp() {
            await loadMasters();
            await loadInfoAndGenerateButtons();
            setLastUpdateTime();
        }

        // メニュー内「データを再読み込み」を押したときの処理
        async function reloadData() {
            toggleMenu(); // メニューを閉じる
            await loadMasters();
            await loadInfoAndGenerateButtons();
            if (currentSystem) {
                await loadTimetables();
                await renderRoute();
            }
            setLastUpdateTime();
        }

        function parseCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '').replace(/\r/g, '');
            const lines = cleanText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] ? values[index].trim() : '';
                });
                return obj;
            });
        }

        async function safeFetch(fileName) {
            const encodedName = encodeURIComponent(fileName).replace(/%2F/g, '/');
            const res = await fetch(encodedName);
            if (!res.ok) {
                throw new Error(`HTTPエラー! ステータス: ${res.status} (ファイルが見つかりません: ${fileName})`);
            }
            return await res.text();
        }

        async function loadMasters() {
            try {
                const textStation = await safeFetch('zaisen - station_id.csv');
                parseCSV(textStation).forEach(row => {
                    stationsMap[row['駅ID']] = row['駅名'];
                });

                const textRail = await safeFetch('zaisen - railroad_id.csv');
                parseCSV(textRail).forEach(row => {
                    railroadMap[row['路線ID']] = row;
                });
            } catch (e) {
                console.error("マスタデータの読み込みに失敗:", e.message);
            }
        }

        async function loadInfoAndGenerateButtons() {
            try {
                const textInfo = await safeFetch('zaisen - info.csv');
                const infoData = parseCSV(textInfo);

                const homeScreen = document.getElementById('home-screen');
                homeScreen.innerHTML = '';

                infoData.forEach(row => {
                    const keys = Object.keys(row);
                    const sysIdKey = keys.find(k => k.includes('路線系統') && !k.includes('名'));
                    const sysNameKey = keys.find(k => k.includes('路線系統') && k.includes('名'));

                    const sysId = row[sysIdKey];
                    const sysName = row[sysNameKey] || sysId;

                    if (!sysId) return;

                    systemNameMap[sysId] = sysName;

                    if (!activeLayouts[sysId]) {
                        activeLayouts[sysId] = `zaisen - ${sysId}-1.csv`; 
                    }

                    const btn = document.createElement('button');
                    btn.className = 'system-btn';
                    btn.innerText = sysName;
                    btn.onclick = () => loadZaisen(sysId);
                    homeScreen.appendChild(btn);
                });
            } catch (e) {
                console.error("info.csvの読み込みに失敗:", e.message);
            }
        }

        async function loadZaisen(systemId) {
            currentSystem = systemId;
            document.getElementById('header-title').innerText = systemNameMap[systemId] || "位置情報";
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('zaisen-screen').style.display = 'block';
            document.getElementById('back-button').style.display = 'block';

            await loadTimetables();
            await renderRoute();
        }

        function showHomeScreen() {
            document.getElementById('header-title').innerText = "ホーム";
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('zaisen-screen').style.display = 'none';
            document.getElementById('back-button').style.display = 'none';
        }

        async function loadTimetables() {
            const now = new Date();
            const isHoliday = (now.getDay() === 0 || now.getDay() === 6);
            const dayKey = isHoliday ? 'h' : 'w';

            try {
                const textIn = await safeFetch(`jreja_${dayKey}_in.csv`);
                timetables.in = parseTimetableCSV(textIn);

                const textOut = await safeFetch(`jreja_${dayKey}_out.csv`);
                timetables.out = parseTimetableCSV(textOut);
            } catch (e) {
                console.warn("時刻表ファイルが一部見つかりません:", e.message);
            }
        }

        function parseTimetableCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '').replace(/\r/g, '');
            const lines = cleanText.split('\n').filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            
            const trainNumbers = lines[0].split(',').slice(2);
            const trains = trainNumbers.map(num => ({ trainNo: num.trim(), stops: {} }));

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const stationName = cols[0].trim();
                const type = cols[1].trim();
                
                for (let j = 2; j < cols.length; j++) {
                    const timeStr = cols[j] ? cols[j].trim() : '';
                    if (timeStr && trains[j-2]) {
                        if (!trains[j-2].stops[stationName]) {
                            trains[j-2].stops[stationName] = {};
                        }
                        trains[j-2].stops[stationName][type] = timeStr;
                    }
                }
            }
            return trains.filter(t => t.trainNo !== '');
        }

        async function renderRoute() {
            const layoutFile = activeLayouts[currentSystem];
            if (!layoutFile) return;

            try {
                const textLayout = await safeFetch(layoutFile);
                currentStations = parseCSV(textLayout);

                const stationListDiv = document.getElementById('station-list');
                const lineLayerDiv = document.getElementById('line-layer');
                stationListDiv.innerHTML = '';
                lineLayerDiv.innerHTML = '';

                currentStations.forEach((row, index) => {
                    const stationId = row['駅ID'];
                    const stationName = stationsMap[stationId] || stationId;

                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'station-row';
                    rowDiv.id = `station-row-${stationId}`;

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'station-name';
                    nameDiv.innerText = stationName;
                    rowDiv.appendChild(nameDiv);

                    if (row['表示先']) {
                        const btn = document.createElement('button');
                        btn.className = 'branch-trigger';
                        btn.innerText = row['分岐方向'] === 'ir' ? '→ 相鉄直通線' : '← りんかい線';
                        btn.onclick = () => {
                            activeLayouts[currentSystem] = `zaisen - ${row['表示先']}.csv`;
                            renderRoute(); 
                        };
                        rowDiv.appendChild(btn);
                    }

                    stationListDiv.appendChild(rowDiv);

                    if (index < currentStations.length - 1) {
                        const segment = document.createElement('div');
                        segment.className = 'railway-line-segment';
                        segment.style.top = `${(index * 83) + 40}px`;
                        segment.style.height = `83px`;
                        
                        const railInfo = railroadMap[row['路線ID']];
                        segment.style.backgroundColor = railInfo ? railInfo['ラインカラー'] : '#999999';
                        lineLayerDiv.appendChild(segment);
                    }
                });

                updateTrainPositions();
            } catch(e) {
                console.error("レイアウトファイルの読み込みに失敗しました:", e.message);
            }
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return null;
            const clean = timeStr.replace(':', '');
            if (clean.length < 3) return null;
            const h = parseInt(clean.substring(0, clean.length - 2));
            const m = parseInt(clean.substring(clean.length - 2));
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0).getTime() / 1000;
        }

        function updateTrainPositions() {
            if (!currentStations.length) return;
            const trainLayer = document.getElementById('train-layer');
            trainLayer.innerHTML = '';

            const nowSec = new Date().getTime() / 1000;
            const positionSlots = {};

            function registerAndRenderTrain(train, yPos, direction) {
                const baseRight = direction === 'in' ? 130 : 80;
                const slotKey = `${Math.round(yPos)}_${direction}`;
                
                if (!positionSlots[slotKey]) positionSlots[slotKey] = 0;
                const offset = positionSlots[slotKey] * 30; 
                positionSlots[slotKey]++;

                const icon = document.createElement('div');
                icon.className = 'train-icon';
                icon.style.top = `${yPos}px`;
                icon.style.right = `${direction === 'in' ? baseRight + offset : baseRight - offset}px`;
                icon.title = `列車番号: ${train.trainNo} (${direction === 'in' ? '上り' : '下り'})`;
                trainLayer.appendChild(icon);
            }

            ['in', 'out'].forEach(dir => {
                const list = timetables[dir] || [];
                list.forEach(train => {
                    for (let i = 0; i < currentStations.length; i++) {
                        const stId = currentStations[i]['駅ID'];
                        const stName = stationsMap[stId];
                        const stopInfo = train.stops[stName];

                        if (!stopInfo) continue;

                        const arrSec = timeToSeconds(stopInfo['着']);
                        const depSec = timeToSeconds(stopInfo['発']);

                        if (arrSec && depSec && nowSec >= arrSec && nowSec <= depSec) {
                            const yPos = (i * 83) + 28;
                            registerAndRenderTrain(train, yPos, dir);
                            return;
                        }

                        if (i < currentStations.length - 1) {
                            const nextStId = currentStations[i+1]['駅ID'];
                            const nextStName = stationsMap[nextStId];
                            const nextStopInfo = train.stops[nextStName];

                            if (nextStopInfo && depSec) {
                                const nextArrSec = timeToSeconds(nextStopInfo['着']);
                                if (nextArrSec && nowSec > depSec && nowSec < nextArrSec) {
                                    const ratio = (nowSec - depSec) / (nextArrSec - depSec);
                                    const startY = (i * 83) + 28;
                                    const endY = ((i + 1) * 83) + 28;
                                    const yPos = startY + (endY - startY) * ratio;

                                    registerAndRenderTrain(train, yPos, dir);
                                    return;
                                }
                            }
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
