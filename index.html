<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在線アプリ</title>
    <style>
        :root {
            --bg-color: #F0F0F0;
            --sub-bg-color: #F8F8F8;   
            --header-bg: #1C1C1C;
            --btn-color: #333333;
            /* 高さを従来の7割に縮小 (80px * 0.7 = 56px) */
            --row-height: 56px; 
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            overflow-x: hidden;
        }

        .header { 
            background: var(--header-bg);
            color: white; 
            padding: 0 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 56px;
            font-size: 1.1rem; 
            position: sticky; 
            top: 0;
            z-index: 100; 
            margin: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 200;
        }
        .menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: white;
            transition: 0.3s;
        }

        .menu-btn.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-btn.active span:nth-child(2) { opacity: 0; }
        .menu-btn.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 250px;
            height: 100%;
            background: rgba(28, 28, 28, 0.95);
            z-index: 150;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
        }
        .nav-menu.active { right: 0; }
        .nav-menu-item {
            padding: 20px;
            color: white;
            border-bottom: 1px solid #444;
            cursor: pointer;
            font-size: 16px;
            display: block;
            text-decoration: none;
        }
        .nav-menu-item:active { background: #444; }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 140;
        }
        .menu-overlay.active { display: block; }

        .screen { padding: 0; } 

        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
            padding: 20px;
        }

        .system-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            transition: opacity 0.2s;
        }
        .system-btn:hover { opacity: 0.9; }

        #zaisen-screen {
            display: none;
            position: relative;
            width: 100%;
            max-width: 600px; 
            margin: 0 auto;
            background-color: var(--bg-color);
        }

        .station-block {
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        .station-row {
            display: flex;
            align-items: center;
            height: var(--row-height);
            background-color: var(--sub-bg-color); 
            border-bottom: 1px solid #e0e0e0;
            box-sizing: border-box;
            position: relative;
            width: 100%;
        }

        .between-row {
            height: var(--row-height);
            background-color: var(--bg-color); 
            position: relative;
            width: 100%;
        }

        .station-name-container {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 20px;
            z-index: 2;
            max-width: 60%; 
            box-sizing: border-box;
        }

        .station-name {
            font-weight: bold;
            font-size: 0.95rem; /* 駅名表示を少し小さく変更 */
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-icon-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background-color: #10B981; 
            border-radius: 50%;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .railway-svg-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .train-layer {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .train-icon {
            position: absolute;
            width: 24px;
            height: 24px;
            background-image: url('icon/unknown.png');
            background-size: contain;
            background-repeat: no-repeat;
            /* アニメーション用のtransitionを削除 */
        }

        .branch-clickable-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .branch-clickable-zone {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
            background-color: rgba(0, 122, 255, 0.0); 
            transition: background-color 0.2s;
        }
        .branch-clickable-zone:active {
            background-color: rgba(0, 122, 255, 0.2);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.15s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0,0,0,0.1);
            border-top-color: var(--btn-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loading-screen" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <div class="header">
        <button id="back-button" class="back-btn" onclick="showHomeScreen()">← 戻る</button>
        <span id="header-title">ホーム</span>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div id="nav-menu" class="nav-menu">
        <div id="last-update" class="nav-menu-item" style="cursor: default; background: none; color: #ccc; font-size: 0.9rem;">
            最終更新：取得中...
        </div>
        <div class="nav-menu-item" onclick="pageReload()">リロード</div>
    </div>
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div id="home-screen" class="screen"></div>

    <div id="zaisen-screen" class="screen">
        <div id="station-list"></div>
        <svg id="svg-layer" class="railway-svg-container"></svg>
        <div id="clickable-layer" class="branch-clickable-container"></div>
        <div id="train-layer" class="train-layer"></div>
    </div>

    <script>
        let systemNameMap = {};
        let activeLayouts = {};    
        let stationsMap = {};      
        let railroadMap = {};      
        
        let currentSystem = '';     
        let currentStations = [];
        let timetables = { in: [], out: [] }; 

        // 7割の高さに変更したため、1ブロックあたりの高さを112px（56px * 2）に設定
        const BLOCK_HEIGHT = 112;
        const ROW_HALF_HEIGHT = 28;

        function getLineX() {
            const screenWidth = document.getElementById('zaisen-screen').clientWidth || window.innerWidth;
            return screenWidth * 0.70;
        }
        
        const LINE_WIDTH = 20;
        window.onresize = () => {
            if (document.getElementById('zaisen-screen').style.display === 'block') {
                renderRoute();
            }
        };

        // 毎分0秒に同期して更新処理をループさせる関数
        function syncUpdateLoop() {
            updateTrainPositions();
            const now = new Date();
            const delay = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            setTimeout(() => {
                syncUpdateLoop();
            }, delay);
        }

        window.onload = async () => {
            await fetchGitHubCommits();
            await initApp();
            syncUpdateLoop(); // 毎分0秒同期のループを開始
        };

        function toggleMenu() {
            document.querySelector('.menu-btn').classList.toggle('active');
            document.getElementById('nav-menu').classList.toggle('active');
            document.getElementById('menu-overlay').classList.toggle('active');
        }

        function pageReload() { location.reload(); }

        async function fetchGitHubCommits() {
            const updateEl = document.getElementById('last-update');
            try {
                const response = await fetch(window.location.href, { method: 'HEAD' });
                const lastMod = response.headers.get('Last-Modified');
                updateEl.innerText = '最終更新：' + (lastMod ? new Date(lastMod) : new Date()).toLocaleTimeString('ja-JP');
            } catch (e) {
                updateEl.innerText = '最終更新：' + new Date().toLocaleTimeString('ja-JP');
            }
        }

        async function initApp() {
            await loadMasters();
            await loadInfoAndGenerateButtons();
        }

        function parseCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '').replace(/\r/g, '');
            const lines = cleanText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/[\u200B-\u200D\uFEFF]/g, ''));
            
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    if (header) {
                        obj[header] = values[index] ? values[index].trim() : '';
                    }
                });
                return obj;
            });
        }

        async function safeFetch(baseName) {
            try {
                const encodedName = encodeURIComponent(baseName).replace(/%2F/g, '/');
                const res = await fetch(encodedName);
                if (res.ok) return await res.text();
            } catch (e) {}
            throw new Error(`ファイルが見つかりません: ${baseName}`);
        }

        async function loadMasters() {
            try {
                const textStation = await safeFetch('zaisen - station_id.csv');
                parseCSV(textStation).forEach(row => {
                    if (row['駅ID'] && row['駅名']) {
                        stationsMap[row['駅ID']] = row['駅名'];
                    }
                });
                const textRail = await safeFetch('zaisen - railroad_id.csv');
                parseCSV(textRail).forEach(row => {
                    if (row['路線ID']) {
                        railroadMap[row['路線ID']] = row;
                    }
                });
            } catch (e) {
                console.error("マスタデータの読み込みに失敗:", e.message);
            }
        }

        function getLineColorById(routeId) {
            if (routeId && railroadMap[routeId]) {
                return railroadMap[routeId]['ラインカラー'];
            }
            return '#999999';
        }

        function getRouteNameById(routeId) {
            if (routeId && railroadMap[routeId]) {
                return railroadMap[routeId]['路線名'];
            }
            return routeId || '';
        }

        async function loadInfoAndGenerateButtons() {
            try {
                const textInfo = await safeFetch('zaisen - info.csv');
                const infoData = parseCSV(textInfo);

                const homeScreen = document.getElementById('home-screen');
                homeScreen.innerHTML = '';
                infoData.forEach(row => {
                    const sysId = row['路線系統'];
                    const sysName = row['路線系統表示名'] || sysId;
                    if (!sysId) return;

                    systemNameMap[sysId] = sysName;
                     
                    if (!activeLayouts[sysId]) {
                        activeLayouts[sysId] = `display/${sysId}-1.csv`; 
                    }

                    const btn = document.createElement('button');
                    btn.className = 'system-btn';
                    btn.innerText = sysName;
                    btn.onclick = () => loadZaisen(sysId);
                    homeScreen.appendChild(btn);
               });
            } catch (e) {
                console.error("info.csvの読み込みに失敗:", e.message);
            }
        }

        function scrollToStation(stationId) {
            const targetElement = document.getElementById(`station-row-${stationId}`);
            if (targetElement) {
                const elementRect = targetElement.getBoundingClientRect();
                const absoluteElementTop = elementRect.top + window.pageYOffset;
                const middle = absoluteElementTop - (window.innerHeight / 2) + (elementRect.height / 2);
                window.scrollTo({ top: middle, behavior: 'auto' });
            }
        }

        async function loadZaisen(systemId, anchorStationId = null) {
            const loader = document.getElementById('loading-screen');
            const zaisenScreen = document.getElementById('zaisen-screen');

            if (anchorStationId && loader) {
                loader.style.opacity = '1';
                loader.style.display = 'flex';
                zaisenScreen.style.opacity = '0';
            }

            currentSystem = systemId;
            document.getElementById('header-title').innerText = systemNameMap[systemId] || "位置情報";
            document.getElementById('home-screen').style.display = 'none';
            zaisenScreen.style.display = 'block';
            document.getElementById('back-button').style.display = 'block';

            await loadTimetables();
            await renderRoute();
            if (anchorStationId) {
                setTimeout(() => {
                    scrollToStation(anchorStationId);
                    zaisenScreen.style.opacity = '1';
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => { loader.style.display = 'none'; }, 150);
                    }
                }, 50);
            } else {
                zaisenScreen.style.opacity = '1';
                if (loader) loader.style.display = 'none';
            }
        }

        function showHomeScreen() {
            document.getElementById('header-title').innerText = "ホーム";
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('zaisen-screen').style.display = 'none';
            document.getElementById('back-button').style.display = 'none';
        }

        // 内閣府のAPI(CSV)から祝日データを取得して判定する関数
        async function checkIsHolidayAPI(targetDate) {
            try {
                const res = await fetch('https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv');
                if (!res.ok) return false;
                const buffer = await res.arrayBuffer();
                const decoder = new TextDecoder('shift-jis'); // 内閣府CSVはShift-JIS
                const text = decoder.decode(buffer);
                const lines = text.split('\n');
                
                // YYYY/M/D または YYYY/MM/DD の形式を合わせる
                const ty = targetDate.getFullYear();
                const tm = targetDate.getMonth() + 1;
                const td = targetDate.getDate();
                const targetStr = `${ty}/${tm}/${td}`;
                const targetStrZero = `${ty}/${String(tm).padStart(2,'0')}/${String(td).padStart(2,'0')}`;

                for(let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if(cols[0]) {
                        const csvDate = cols[0].trim();
                        if(csvDate === targetStr || csvDate === targetStrZero) {
                            return true;
                        }
                    }
                }
            } catch (e) {
                console.error("祝日データの取得に失敗しました:", e);
            }
            return false;
        }

        async function loadTimetables() {
            let now = new Date();
            
            // 【4時基準の1日概念ロジック】
            // 朝4時より前（0:00〜3:59）であれば、前日の日付として処理する
            if (now.getHours() < 4) {
                now = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            }

            // 内閣府データから祝日かどうかの判定を取得
            const isHolidayAPI = await checkIsHolidayAPI(now);
            const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
            
            // 土曜日・日曜日、または祝日の場合は休日ダイヤ('h')、それ以外は平日ダイヤ('w')
            let dayKey = (isWeekend || isHolidayAPI) ? 'h' : 'w';
            timetables.in = [];
            timetables.out = [];

            const todayTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            let calendarData = [];
            try {
                const textCalendar = await safeFetch('zaisen - calendar.csv');
                calendarData = parseCSV(textCalendar);
            } catch (e) {
                console.error("カレンダーCSVの読み込みに失敗しました。ファイルを確認してください。", e.message);
                return;
            }

            const routeIds = Object.keys(railroadMap);
            for (const routeId of routeIds) {
                const routeMaster = railroadMap[routeId];
                if (!routeMaster) continue;

                const sysFolder = routeMaster['路線系統'] || 'saikyo';
                const filePrefix = routeMaster['時刻表ID'] || routeId;
                const systemRules = calendarData.filter(row => row['路線系統'] === sysFolder);

                let activeTimetableDate = '';
                let finalDayKey = dayKey;
                const defaultRule = systemRules.find(row => !row['開始日'] && !row['終了日']);
                if (defaultRule) {
                    activeTimetableDate = defaultRule['改正日'];
                }

                for (const rule of systemRules) {
                    if (rule['開始日'] && rule['終了日']) {
                        const startTime = new Date(rule['開始日']).getTime();
                        const endTime = new Date(rule['終了日']).getTime();

                        if (!isNaN(startTime) && !isNaN(endTime) && todayTime >= startTime && todayTime <= endTime) {
                            if (rule['改正日']) activeTimetableDate = rule['改正日'];
                            if (rule['例外ダイヤ名']) finalDayKey = rule['例外ダイヤ名'];
                            break; 
                        }
                    }
                }

                if (!activeTimetableDate) {
                    console.warn(`系統: ${sysFolder} の改正日がカレンダーCSV内で見つかりません。`);
                    continue;
                }

                const folderPath = `railroad/${sysFolder}/${activeTimetableDate}`;
                try {
                    const textIn = await safeFetch(`${folderPath}/${filePrefix}_${finalDayKey}_in.csv`);
                    timetables.in = timetables.in.concat(parseTimetableCSV(textIn));
                } catch (e) {
                    console.warn(`上り時刻表の読み込みスキップ: ${filePrefix}_${finalDayKey} (${folderPath})`, e.message);
                }
                try {
                    const textOut = await safeFetch(`${folderPath}/${filePrefix}_${finalDayKey}_out.csv`);
                    timetables.out = timetables.out.concat(parseTimetableCSV(textOut));
                } catch (e) {
                    console.warn(`下り時刻表の読み込みスキップ: ${filePrefix}_${finalDayKey} (${folderPath})`, e.message);
                }
            }
        }

        function parseTimetableCSV(text) {
            const cleanText = text.replace(/^\uFEFF/, '').replace(/\r/g, '');
            const lines = cleanText.split('\n').filter(l => l.trim() !== '');
            if (lines.length < 6) return [];

            const trainNumbers = lines[0].split(',').slice(2);
            const trains = trainNumbers.map(num => ({ trainNo: num.trim(), stops: {} }));
            for (let i = 5; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim());
                if (cols.length < 3) continue;

                const stationName = cols[0];
                const type = cols[1];
                if (!stationName || (type !== '着' && type !== '発')) continue;
                for (let j = 2; j < cols.length; j++) {
                    const timeStr = cols[j];
                    if (timeStr && trains[j - 2]) {
                        if (!trains[j - 2].stops[stationName]) {
                            trains[j - 2].stops[stationName] = {};
                        }
                        trains[j - 2].stops[stationName][type] = timeStr;
                    }
                }
            }
            return trains.filter(t => t.trainNo !== '');
        }

        async function renderRoute() {
            const layoutFile = activeLayouts[currentSystem];
            if (!layoutFile) return;

            try {
                const textLayout = await safeFetch(layoutFile);
                currentStations = parseCSV(textLayout);

                const stationListDiv = document.getElementById('station-list');
                const svgLayer = document.getElementById('svg-layer');
                const clickableLayer = document.getElementById('clickable-layer');
                const screenWidth = document.getElementById('zaisen-screen').clientWidth || window.innerWidth;
                const lineX = getLineX();

                stationListDiv.innerHTML = '';
                svgLayer.innerHTML = '';
                clickableLayer.innerHTML = '';
                
                // 高さ縮小に伴い全体の高さを再計算
                const totalHeight = currentStations.length * BLOCK_HEIGHT - ROW_HALF_HEIGHT * 2; 
                svgLayer.setAttribute('height', totalHeight);
                svgLayer.setAttribute('width', screenWidth);
                svgLayer.setAttribute('viewBox', `0 0 ${screenWidth} ${totalHeight}`);
                
                currentStations.forEach((row, index) => {
                    const stationId = row['駅ID'];
                    if (!stationId) return;
                    const stationName = stationsMap[stationId] || stationId;

                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'station-block';

                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'station-row';
                    rowDiv.id = `station-row-${stationId}`;

                    const nameContainer = document.createElement('div');
                    nameContainer.className = 'station-name-container';
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'station-name';
                    nameDiv.innerText = stationName;
                    
                    const dotIcon = document.createElement('div');
                    dotIcon.className = 'station-icon-dot';
                    dotIcon.innerText = '＞'; // 半角の「>」から全角の「＞」に変更

                    nameContainer.appendChild(nameDiv);
                    nameContainer.appendChild(dotIcon);
                    rowDiv.appendChild(nameContainer);
                    blockDiv.appendChild(rowDiv);

                    if (index < currentStations.length - 1) {
                        const betweenDiv = document.createElement('div');
                        betweenDiv.className = 'between-row';
                        blockDiv.appendChild(betweenDiv);
                    }
                    stationListDiv.appendChild(blockDiv);
                    
                    const currentY = index * BLOCK_HEIGHT + ROW_HALF_HEIGHT; 
                    
                    const currentRailId = row['路線ID'];
                    const currentLineColor = getLineColorById(currentRailId);
                    const branchRouteId = row['分岐路線'] || '';
                    const targetBranchName = getRouteNameById(branchRouteId);
                    const branchLineColor = getLineColorById(branchRouteId);
                    if (index < currentStations.length - 1) {
                        const nextY = (index + 1) * BLOCK_HEIGHT + ROW_HALF_HEIGHT;
                        const branch = row['分岐方向']; 

                        let mainD = `M ${lineX} ${nextY} L ${lineX} ${currentY}`;
                        if (branch === 'ic' || branch === 'oc') {
                            mainD = `M ${lineX} ${currentY} L ${lineX} ${currentY + ROW_HALF_HEIGHT}`;
                        }

                        const mainPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        mainPath.setAttribute('d', mainD);
                        mainPath.setAttribute('stroke', currentLineColor);
                        mainPath.setAttribute('stroke-width', LINE_WIDTH);
                        mainPath.setAttribute('fill', 'none');
                        svgLayer.appendChild(mainPath);

                        if (branch && branch !== 'ic' && branch !== 'oc') {
                            const branchPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            let branchD = '';
                            let textX = 0;
                            let textY = 0;
                            let zoneLeft = 0, zoneTop = 0, zoneWidth = 0, zoneHeight = ROW_HALF_HEIGHT;
                            if (branch === 'il') {
                                branchD = `M ${lineX} ${currentY} Q ${lineX} ${currentY - ROW_HALF_HEIGHT}, ${lineX - ROW_HALF_HEIGHT} ${currentY - ROW_HALF_HEIGHT} L 0 ${currentY - ROW_HALF_HEIGHT}`;
                                textX = 20; textY = (currentY - ROW_HALF_HEIGHT) + 2; 
                                zoneLeft = 0; zoneTop = currentY - ROW_HALF_HEIGHT - 20;
                                zoneWidth = lineX; zoneHeight = 50;
                            } else if (branch === 'ir') {
                                branchD = `M ${lineX} ${currentY} Q ${lineX} ${currentY - ROW_HALF_HEIGHT}, ${lineX + ROW_HALF_HEIGHT} ${currentY - ROW_HALF_HEIGHT} L ${screenWidth} ${currentY - ROW_HALF_HEIGHT}`;
                                textX = lineX + 40; textY = (currentY - ROW_HALF_HEIGHT) + 2; 
                                zoneLeft = lineX; zoneTop = currentY - ROW_HALF_HEIGHT - 20;
                                zoneWidth = screenWidth - lineX; zoneHeight = 50;
                            } else if (branch === 'ol') {
                                branchD = `M ${lineX} ${currentY} Q ${lineX} ${currentY + ROW_HALF_HEIGHT}, ${lineX - ROW_HALF_HEIGHT} ${currentY + ROW_HALF_HEIGHT} L 0 ${currentY + ROW_HALF_HEIGHT}`;
                                textX = 20; textY = (currentY + ROW_HALF_HEIGHT) + 2; 
                                zoneLeft = 0; zoneTop = currentY + 15;
                                zoneWidth = lineX; zoneHeight = 50;
                            } else if (branch === 'or') {
                                branchD = `M ${lineX} ${currentY} Q ${lineX} ${currentY + ROW_HALF_HEIGHT}, ${lineX + ROW_HALF_HEIGHT} ${currentY + ROW_HALF_HEIGHT} L ${screenWidth} ${currentY + ROW_HALF_HEIGHT}`;
                                textX = lineX + 40; textY = (currentY + ROW_HALF_HEIGHT) + 2; 
                                zoneLeft = lineX; zoneTop = currentY + 15;
                                zoneWidth = screenWidth - lineX; zoneHeight = 50;
                            }

                            if (branchD) {
                                branchPath.setAttribute('d', branchD);
                                branchPath.setAttribute('stroke', branchLineColor);
                                branchPath.setAttribute('stroke-width', LINE_WIDTH);
                                branchPath.setAttribute('fill', 'none');
                                svgLayer.appendChild(branchPath);

                                if (targetBranchName) {
                                    const textSvg = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                                    textSvg.setAttribute('x', textX);
                                    textSvg.setAttribute('y', textY);
                                    textSvg.setAttribute('fill', '#FFFFFF');
                                    textSvg.setAttribute('font-size', '14px');
                                    textSvg.setAttribute('font-weight', 'bold');
                                    textSvg.setAttribute('dominant-baseline', 'central');
                                    textSvg.textContent = targetBranchName;
                                    svgLayer.appendChild(textSvg);
                                }

                                if (row['表示先']) {
                                    const clickZone = document.createElement('div');
                                    clickZone.className = 'branch-clickable-zone';
                                    clickZone.style.left = `${zoneLeft}px`;
                                    clickZone.style.top = `${zoneTop}px`;
                                    clickZone.style.width = `${zoneWidth}px`;
                                    clickZone.style.height = `${zoneHeight}px`;
                                    clickZone.onclick = (e) => {
                                        e.stopPropagation();
                                        activeLayouts[currentSystem] = `display/${row['表示先']}.csv`;
                                        loadZaisen(currentSystem, stationId); 
                                    };
                               
                                    clickableLayer.appendChild(clickZone);
                                }
                            }
                        }
                    }

                    // ●から〇に変えるため、fillを#FFFFFF(白)、strokeを#000000(黒)に変更
                    const stationDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    stationDot.setAttribute('cx', lineX);
                    stationDot.setAttribute('cy', currentY);
                    stationDot.setAttribute('r', '14'); 
                    stationDot.setAttribute('fill', '#FFFFFF'); 
                    stationDot.setAttribute('stroke', '#000000');
                    stationDot.setAttribute('stroke-width', '3');
                    svgLayer.appendChild(stationDot);
                });

                updateTrainPositions();
            } catch(e) {
                console.error("レイアウトファイルの読み込みに失敗しました:", e.message);
            }
        }

        // 4時基準の1日を跨ぐタイムスタンプを秒に変換するロジック
        function timeToSeconds(timeStr) {
            if (!timeStr) return null;
            const clean = timeStr.replace(':', '').trim();
            if (clean.length < 3) return null;

            const h = parseInt(clean.substring(0, clean.length - 2), 10);
            const m = parseInt(clean.substring(clean.length - 2), 10);
            
            let now = new Date();
            // 現在時刻が4時未満なら基準日を1日前として扱う
            if (now.getHours() < 4) {
                now = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            }
            
            // 時刻表の時間が4時未満（24時以降など含む）かつ現在の実際の時間が深夜帯のケースなどの調整
            let targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
            return targetDate.getTime() / 1000;
        }

        function updateTrainPositions() {
            if (!currentStations || !currentStations.length) return;
            const trainLayer = document.getElementById('train-layer');
            if (!trainLayer) return;
            trainLayer.innerHTML = '';

            const nowSec = new Date().getTime() / 1000;
            const positionSlots = {};
            const lineX = getLineX();

            function registerAndRenderTrain(train, yPos, direction) {
                // 列車アイコンを線から少し離すため、オフセット量を調整（in: -35→-45, out: +15→+25）
                const baseLeft = direction === 'in' ? (lineX - 45) : (lineX + 25);
                
                const slotKey = `${Math.round(yPos / 20) * 20}_${direction}`;
                if (!positionSlots[slotKey]) positionSlots[slotKey] = 0;
                const offset = positionSlots[slotKey] * 28;
                positionSlots[slotKey]++;

                const finalLeft = direction === 'in' ? (baseLeft - offset) : (baseLeft + offset);

                const icon = document.createElement('div');
                icon.className = 'train-icon';
                icon.style.top = `${yPos - 12}px`;
                icon.style.left = `${finalLeft}px`;
                icon.title = `列車番号: ${train.trainNo} (${direction === 'in' ? '上り' : '下り'})`;
                trainLayer.appendChild(icon);
            }

            ['in', 'out'].forEach(dir => {
                const list = timetables[dir] || [];
                list.forEach(train => {
                    for (let i = 0; i < currentStations.length; i++) {
                        const stationId = currentStations[i]['駅ID'];
                        const stName = stationsMap[stationId];
                        if (!stName) continue;
                        
                        const stopInfo = train.stops[stName];
                        if (!stopInfo) continue;

                        let arrSec = timeToSeconds(stopInfo['着']);
                        let depSec = timeToSeconds(stopInfo['発']);
                        
                        // 到着時刻が設定されていない場合は、発車時刻を基準にする
                        if (!arrSec && depSec) arrSec = depSec;

                        const currentStationY = i * BLOCK_HEIGHT + ROW_HALF_HEIGHT;

                        // 【条件1: 駅にいる】 A駅到着時刻 <= now < A駅発車時刻
                        if (arrSec && depSec && nowSec >= arrSec && nowSec < depSec) {
                            registerAndRenderTrain(train, currentStationY, dir);
                            return;
                        }

                        // 【条件2: 駅間にいる】 A駅発車時刻 <= now < B駅到着時刻
                        if (i < currentStations.length - 1) {
                            const nextStationId = currentStations[i+1]['駅ID'];
                            const nextStName = stationsMap[nextStationId];
                            if (!nextStName) continue;
                            
                            const nextStopInfo = train.stops[nextStName];
                            if (nextStopInfo && depSec) {
                                let nextArrSec = timeToSeconds(nextStopInfo['着']);
                                let nextDepSec = timeToSeconds(nextStopInfo['発']);
                                
                                // 次の駅の到着時刻が取得できない時は発車時刻を使う
                                if (!nextArrSec && nextDepSec) nextArrSec = nextDepSec;

                                if (nextArrSec && nowSec >= depSec && nowSec < nextArrSec) {
                                    // アニメーションなし・中央固定（駅と駅のちょうど真ん中：0.5）
                                    const nextStationY = (i + 1) * BLOCK_HEIGHT + ROW_HALF_HEIGHT;
                                    const yPos = currentStationY + (nextStationY - currentStationY) * 0.5;
                                    registerAndRenderTrain(train, yPos, dir);
                                    return;
                                }
                            }
                        }
                        // updateTrainPositions内のループの中にこれを挿入
if (nowSec >= arrSec && nowSec < depSec) {
    // 駅にいる
    registerAndRenderTrain(train, currentStationY, dir);
    return;
} else if (nowSec >= depSec && nowSec < nextArrSec) {
    // 間にいる
    // ...
    return;
} else {
    // 【ここが重要！】ここに来ているということは、
    // 現在時刻がどの条件にも当てはまらない「時刻表の隙間」にいる列車です
    console.log(`列車 ${train.trainNo} が範囲外です: 現在=${new Date(nowSec*1000).toLocaleTimeString()}, 発=${depSec}, 着=${nextArrSec}`);
}
                    }
                });
            });
        }
    </script>
