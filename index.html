<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在線アプリ</title>
    <style>
        :root {
            --bg-color: #F0F0F0;
            --sub-bg-color: #F8F8F8;
            --header-bg: #1C1C1C;
            --btn-color: #333333;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
        }

        /* ヘッダー */
        .header { 
            background: var(--header-bg);
            color: white; 
            padding: 0 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 56px;
            font-size: 1.1rem; 
            position: sticky; 
            top: 0;
            z-index: 100; 
            margin: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }

        /* ホーム画面（系統選択） */
        .screen {
            padding: 20px;
        }

        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
        }

        .system-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            transition: opacity 0.2s;
        }

        .system-btn:hover {
            opacity: 0.9;
        }

        /* 位置情報画面（レイアウト） */
        #zaisen-screen {
            display: none;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
        }

        /* 中央やや右の路線（太さ20px） */
        .railway-line-container {
            position: absolute;
            right: 120px; /* 中央やや右 */
            top: 0;
            bottom: 0;
            width: 20px;
            pointer-events: none;
            z-index: 1;
        }

        .railway-line-segment {
            width: 100%;
            position: absolute;
        }

        /* 駅エリアのラッピング */
        .station-row {
            display: flex;
            align-items: center;
            height: 80px; /* 駅ごとの等間隔高さ */
            position: relative;
            background-color: var(--sub-bg-color); /* サブ背景色 */
            margin-bottom: 2px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* 駅名表示（画面左側） */
        .station-name {
            width: 150px;
            padding-left: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 2;
        }

        /* 列車アイコンのスタイル */
        .train-icon {
            position: absolute;
            width: 24px;
            height: 24px;
            background-image: url('unknown.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
            transition: all 0.5s linear;
        }

        /* 分岐切り替えボタン（大崎などで表示） */
        .branch-trigger {
            position: absolute;
            right: 20px;
            background: #e0e0e0;
            border: 1px solid #999;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="back-button" class="back-btn" onclick="showHomeScreen()">← 戻る</button>
        <span id="header-title">在線位置情報マスタ</span>
        <span id="current-time">00:00:00</span>
    </div>

    <div id="home-screen" class="screen">
        <button class="system-btn" onclick="loadZaisen('saikyo')">埼京•相直•りんかい線系統</button>
    </div>

    <div id="zaisen-screen" class="screen">
        <div id="station-list"></div>
        <div id="line-layer" class="railway-line-container"></div>
        <div id="train-layer"></div>
    </div>

    <script>
        // グローバル状態管理
        let currentSystem = '';
        let currentLayoutFile = 'zaisen - saikyo-1.csv'; // 初期値
        let stationsMap = {};    // station_idマスタ
        let railroadMap = {};    // railroad_idマスタ
        let currentStations = []; // 現在画面に表示されている駅順リスト
        let timetables = { in: [], out: [] }; // 読み込んだ当日の時刻表

        // 定期アップデートタイマー
        setInterval(updateClock, 1000);
        setInterval(updateTrainPositions, 5000); // 5秒ごとに列車位置を更新

        // 起動時処理
        window.onload = async () => {
            updateClock();
            await loadMasters();
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ja-JP');
        }

        // CSVパース用の簡易関数
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',');
            return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header.trim()] = values[index] ? values[index].trim() : '';
                });
                return obj;
            });
        }

        // マスタデータの事前読み込み
        async function loadMasters() {
            try {
                const resStation = await fetch('zaisen - station_id.csv');
                const textStation = await resStation.text();
                parseCSV(textStation).forEach(row => {
                    stationsMap[row['駅ID']] = row['駅名'];
                });

                const resRail = await fetch('zaisen - railroad_id.csv');
                const textRail = await resRail.text();
                parseCSV(textRail).forEach(row => {
                    railroadMap[row['路線ID']] = row;
                });
            } catch (e) {
                console.error("マスタデータの読み込みに失敗しました", e);
            }
        }

        // 在線画面への遷移
        async function loadZaisen(systemId) {
            currentSystem = systemId;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('zaisen-screen').style.display = 'block';
            document.getElementById('back-button').style.display = 'block';

            await loadTimetables();
            await renderRoute();
        }

        function showHomeScreen() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('zaisen-screen').style.display = 'none';
            document.getElementById('back-button').style.display = 'none';
            document.getElementById('header-title').innerText = "在線位置情報マスタ";
        }

        // 曜日・上下に応じた時刻表の取得
        async function loadTimetables() {
            const now = new Date();
            const isHoliday = (now.getDay() === 0 || now.getDay() === 6); // 土日を休日と判定
            const dayKey = isHoliday ? 'h' : 'w';

            // 系統ごとのCSVファイルを読み込む (例: jreja_w_in.csv)
            // ※本来は複数の事業者csvを統合しますが、ここでは代表して読み込み処理の構造を作ります
            try {
                const resIn = await fetch(`jreja_${dayKey}_in.csv`);
                const textIn = await resIn.text();
                timetables.in = parseTimetableCSV(textIn);

                const resOut = await fetch(`jreja_${dayKey}_out.csv`);
                const textOut = await resOut.text();
                timetables.out = parseTimetableCSV(textOut);
            } catch (e) {
                console.warn("時刻表の一部が読み込めませんでした。モックデータ等で動作させます。", e);
            }
        }

        // 時刻表CSVは駅が縦・列車が横の特殊構造のため、扱いやすい形に変換
        function parseTimetableCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            
            const trainNumbers = lines[0].split(',').slice(2); // 列車番号の行
            const trains = trainNumbers.map(num => ({ trainNo: num, stops: {} }));

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const stationName = cols[0];
                const type = cols[1]; // "着" または "発"
                
                for (let j = 2; j < cols.length; j++) {
                    const timeStr = cols[j];
                    if (timeStr && trains[j-2]) {
                        if (!trains[j-2].stops[stationName]) {
                            trains[j-2].stops[stationName] = {};
                        }
                        trains[j-2].stops[stationName][type] = timeStr;
                    }
                }
            }
            return trains.filter(t => t.trainNo !== '');
        }

        // 路線・駅図面のレンダリング
        async function renderRoute() {
            const resLayout = await fetch(currentLayoutFile);
            const textLayout = await resLayout.text();
            currentStations = parseCSV(textLayout);

            const stationListDiv = document.getElementById('station-list');
            const lineLayerDiv = document.getElementById('line-layer');
            stationListDiv.innerHTML = '';
            lineLayerDiv.innerHTML = '';

            document.getElementById('header-title').innerText = currentLayoutFile === 'zaisen - saikyo-1.csv' ? "埼京線（相直ルート）" : "埼京線（りんかいルート）";

            currentStations.forEach((row, index) => {
                const stationId = row['駅ID'];
                const stationName = stationsMap[stationId] || stationId;

                // 駅エリア背景（サブ背景色）
                const rowDiv = document.createElement('div');
                rowDiv.className = 'station-row';
                rowDiv.id = `station-row-${stationId}`;

                // 駅名（画面左）
                const nameDiv = document.createElement('div');
                nameDiv.className = 'station-name';
                nameDiv.innerText = stationName;
                rowDiv.appendChild(nameDiv);

                // 分岐切り替えボタンがある場合（大崎駅など）
                if (row['表示先']) {
                    const btn = document.createElement('button');
                    btn.className = 'branch-trigger';
                    btn.innerText = row['分岐方向'] === 'ir' ? '→ 相鉄直通線' : '← りんかい線';
                    btn.onclick = () => {
                        currentLayoutFile = `zaisen - ${row['表示先']}.csv`;
                        renderRoute();
                    };
                    rowDiv.appendChild(btn);
                }

                stationListDiv.appendChild(rowDiv);

                // 中央右の線の描画
                if (index < currentStations.length - 1) {
                    const segment = document.createElement('div');
                    segment.className = 'railway-line-segment';
                    segment.style.top = `${(index * 83) + 40}px`;
                    segment.style.height = `83px`;
                    
                    // railroad_idマスタから線の色を取得
                    const railInfo = railroadMap[row['路線ID']];
                    segment.style.backgroundColor = railInfo ? railInfo['ラインカラー'] : '#999999';
                    lineLayerDiv.appendChild(segment);
                }
            });

            // 駅描画完了後に列車を配置
            updateTrainPositions();
        }

        // 時刻文字列(hhmm)を当日のシリアル秒に変換
        function timeToSeconds(timeStr) {
            if (!timeStr) return null;
            const clean = timeStr.replace(':', '');
            if (clean.length < 3) return null;
            const h = parseInt(clean.substring(0, clean.length - 2));
            const m = parseInt(clean.substring(clean.length - 2));
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0).getTime() / 1000;
        }

        // 列車位置の計算と描画
        function updateTrainPositions() {
            if (!currentStations.length) return;
            const trainLayer = document.getElementById('train-layer');
            trainLayer.innerHTML = '';

            const nowSec = new Date().getTime() / 1000;

            // 位置ごとの列車数カウント（被り回避用横ずらしのため）
            const positionSlots = {};

            function registerAndRenderTrain(train, yPos, direction) {
                // 上りは線の左、下りは線の右
                // 線の中心基準は右から120px + 太さ20pxの半分 = 右から110px
                const baseRight = direction === 'in' ? 130 : 80;
                
                // 重なり判定
                const slotKey = `${Math.round(yPos)}_${direction}`;
                if (!positionSlots[slotKey]) positionSlots[slotKey] = 0;
                const offset = positionSlots[slotKey] * 30; // 被っている場合は横に30pxずつずらす
                positionSlots[slotKey]++;

                const icon = document.createElement('div');
                icon.className = 'train-icon';
                icon.style.top = `${yPos}px`;
                icon.style.right = `${direction === 'in' ? baseRight + offset : baseRight - offset}px`;
                icon.title = `列車番号: ${train.trainNo} (${direction === 'in' ? '上り' : '下り'})`;
                trainLayer.appendChild(icon);
            }

            // 上り(in)・下り(out)両方のタイムテーブルを処理
            ['in', 'out'].forEach(dir => {
                const list = timetables[dir] || [];
                list.forEach(train => {
                    // 現在の画面に並んでいる駅順に沿って、列車がどこにいるかを探す
                    for (let i = 0; i < currentStations.length; i++) {
                        const stId = currentStations[i]['駅ID'];
                        const stName = stationsMap[stId];
                        const stopInfo = train.stops[stName];

                        if (!stopInfo) continue;

                        const arrSec = timeToSeconds(stopInfo['着']);
                        const depSec = timeToSeconds(stopInfo['発']);

                        // 1. 駅に停車中のケース
                        if (arrSec && depSec && nowSec >= arrSec && nowSec <= depSec) {
                            const yPos = (i * 83) + 28; // 駅行の中央付近のY座標
                            registerAndRenderTrain(train, yPos, dir);
                            return;
                        }

                        // 2. 駅間を走行中のケース (次の描画対象駅との間にあるかチェック)
                        if (i < currentStations.length - 1) {
                            const nextStId = currentStations[i+1]['駅ID'];
                            const nextStName = stationsMap[nextStId];
                            const nextStopInfo = train.stops[nextStName];

                            if (nextStopInfo && depSec) {
                                const nextArrSec = timeToSeconds(nextStopInfo['着']);
                                if (nextArrSec && nowSec > depSec && nowSec < nextArrSec) {
                                    // 進行度合いの割合を計算 (0.0 〜 1.0)
                                    const ratio = (nowSec - depSec) / (nextArrSec - depSec);
                                    const startY = (i * 83) + 28;
                                    const endY = ((i + 1) * 83) + 28;
                                    const yPos = startY + (endY - startY) * ratio;

                                    registerAndRenderTrain(train, yPos, dir);
                                    return;
                                }
                            }
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
