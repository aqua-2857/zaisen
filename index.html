<style>
    /* 列車アイコンサイズをエリアの半分の高さ(40px)へ調整 */
    .train-icon {
        position: absolute;
        width: 40px; 
        height: 40px;
        background-image: url('icon/unknown.png');
        background-size: contain;
        background-repeat: no-repeat;
        transition: all 0.5s linear;
        transform: translate(-50%, -50%); /* アイコンの中心が座標にくるように */
    }
</style>

<script>
    // ... 前半は変更なし ...

    function updateTrainPositions() {
        if (!currentStations || !currentStations.length) return;
        const trainLayer = document.getElementById('train-layer');
        if (!trainLayer) return;
        trainLayer.innerHTML = '';

        const nowSec = new Date().getTime() / 1000;
        const lineX = getLineX();

        // 現在表示されている駅名のリストを作成（これに含まれないエリアの列車は表示しない）
        const visibleStationNames = currentStations.map(s => stationsMap[s['駅ID']] || s['駅ID']);

        function registerAndRenderTrain(train, yPos, direction) {
            const icon = document.createElement('div');
            icon.className = 'train-icon';
            icon.style.top = `${yPos}px`;
            icon.style.left = `${lineX}px`; // 配線上に配置
            icon.title = `列車: ${train.trainNo}`;
            trainLayer.appendChild(icon);
        }

        ['in', 'out'].forEach(dir => {
            (timetables[dir] || []).forEach(train => {
                const stops = Object.keys(train.stops);
                
                // 列車が現在地（全表示区間）にいるかチェック
                // 始発駅の発車時刻〜終着駅の到着時刻の範囲内か
                const times = stops.map(st => timeToSeconds(train.stops[st]['発'] || train.stops[st]['着'])).filter(t => t !== null);
                const startTime = Math.min(...times);
                const endTime = Math.max(...times);

                if (nowSec < startTime || nowSec > endTime) return;

                // 各区間の判定
                for (let i = 0; i < currentStations.length - 1; i++) {
                    const stName = stationsMap[currentStations[i]['駅ID']];
                    const nextStName = stationsMap[currentStations[i+1]['駅ID']];
                    
                    if (!train.stops[stName] || !train.stops[nextStName]) continue;

                    const depSec = timeToSeconds(train.stops[stName]['発']);
                    const nextArrSec = timeToSeconds(train.stops[nextStName]['着']);

                    if (depSec && nextArrSec && nowSec >= depSec && nowSec <= nextArrSec) {
                        const ratio = (nowSec - depSec) / (nextArrSec - depSec);
                        const currentY = i * 160 + 40;
                        const nextY = (i + 1) * 160 + 40;
                        const yPos = currentY + (nextY - currentY) * ratio;
                        
                        registerAndRenderTrain(train, yPos, dir);
                        break; 
                    }
                }
            });
        });
    }

    // 描画部分のテキスト位置調整
    // ... renderRoute 内の描画ロジック ...
    // textY を (currentY +/- 40) - 4 に変更（0.1文字分上に修正）
    if (branch === 'il') {
        textY = (currentY - 40) - 4; 
    } else if (branch === 'ir') {
        textY = (currentY - 40) - 4;
    } else if (branch === 'ol') {
        textY = (currentY + 40) - 4;
    } else if (branch === 'or') {
        textY = (currentY + 40) - 4;
    }
    // ... 以降同じ ...
</script>
