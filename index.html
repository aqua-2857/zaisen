<style>
    /* 列車アイコンを30pxに */
    .train-icon {
        position: absolute;
        width: 30px;
        height: 30px;
        background-image: url('icon/unknown.png');
        background-size: contain;
        background-repeat: no-repeat;
        transition: all 0.5s linear;
        z-index: 10;
    }
</style>

<script>
    // 60秒ごとに更新
    setInterval(updateTrainPositions, 60000);

    // 更新ロジックの修正
    function updateTrainPositions() {
        if (!currentStations || !currentStations.length) return;
        const trainLayer = document.getElementById('train-layer');
        if (!trainLayer) return;
        trainLayer.innerHTML = '';

        const nowSec = new Date().getTime() / 1000;
        const positionSlots = {};
        const lineX = getLineX();

        // 現在表示中の駅リスト（範囲外フィルタリング用）
        const visibleStationNames = currentStations.map(s => stationsMap[s['駅ID']] || s['駅ID']);

        function registerAndRenderTrain(train, yPos, direction) {
            const baseLeft = direction === 'in' ? (lineX - 38) : (lineX + 8);
            const slotKey = `${Math.round(yPos / 30) * 30}_${direction}`;
            if (!positionSlots[slotKey]) positionSlots[slotKey] = 0;
            
            const offset = positionSlots[slotKey] * 35;
            positionSlots[slotKey]++;

            const finalLeft = direction === 'in' ? (baseLeft - offset) : (baseLeft + offset);

            const icon = document.createElement('div');
            icon.className = 'train-icon';
            icon.style.top = `${yPos - 15px}px`; // アイコン中心合わせ
            icon.style.left = `${finalLeft}px`;
            icon.title = `列車: ${train.trainNo}`;
            trainLayer.appendChild(icon);
        }

        ['in', 'out'].forEach(dir => {
            const list = timetables[dir] || [];
            list.forEach(train => {
                for (let i = 0; i < currentStations.length - 1; i++) {
                    const st1 = stationsMap[currentStations[i]['駅ID']];
                    const st2 = stationsMap[currentStations[i+1]['駅ID']];
                    
                    // 時刻表データ内に両方の駅が存在するかチェック
                    if (train.stops[st1] && train.stops[st2]) {
                        const depSec = timeToSeconds(train.stops[st1]['発']);
                        const arrSec = timeToSeconds(train.stops[st2]['着']);

                        if (depSec && arrSec && nowSec >= depSec && nowSec <= arrSec) {
                            const ratio = (nowSec - depSec) / (arrSec - depSec);
                            const yPos = (i * 160 + 40) + ((i + 1) * 160 + 40 - (i * 160 + 40)) * ratio;
                            registerAndRenderTrain(train, yPos, dir);
                        }
                    }
                }
            });
        });
    }

    // renderRoute内のテキスト描画（0.1文字分上に微調整）
    // textY = (計算位置) - 2; // 0.1文字分上にオフセット
    // ...
</script>
